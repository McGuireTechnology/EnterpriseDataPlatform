services:
  postgres:
    build:
      context: .
      dockerfile: postgres/Dockerfile.postgres
      args:
        POSTGRES_BASE_IMAGE: ${POSTGRES_BASE_IMAGE:-postgres:16-bookworm}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      AIRFLOW_DATABASE_USER: ${AIRFLOW_DATABASE_USER:-airflow}
      AIRFLOW_DATABASE_PASSWORD: ${AIRFLOW_DATABASE_PASSWORD:-airflow}
      SUPERSET_DATABASE_USER: ${SUPERSET_DATABASE_USER:-superset}
      SUPERSET_DATABASE_PASSWORD: ${SUPERSET_DATABASE_PASSWORD:-superset}
      OPENMETADATA_DATABASE_USER: ${OPENMETADATA_DATABASE_USER:-openmetadata}
      OPENMETADATA_DATABASE_PASSWORD: ${OPENMETADATA_DATABASE_PASSWORD:-openmetadata}
      OPENMETADATA_AIRFLOW_DATABASE_USER: ${OPENMETADATA_AIRFLOW_DATABASE_USER:-openmetadata_airflow}
      OPENMETADATA_AIRFLOW_DATABASE_PASSWORD: ${OPENMETADATA_AIRFLOW_DATABASE_PASSWORD:-openmetadata_airflow}
      CKAN_DATABASE_USER: ${CKAN_DATABASE_USER:-ckan}
      CKAN_DATABASE_PASSWORD: ${CKAN_DATABASE_PASSWORD:-ckan}
      CKAN_DATASTORE_READONLY_USER: ${CKAN_DATASTORE_READONLY_USER:-ckan_datastore_readonly}
      CKAN_DATASTORE_READONLY_PASSWORD: ${CKAN_DATASTORE_READONLY_PASSWORD:-ckan_datastore_readonly}
    volumes:
      - edp-postgres:/var/lib/postgresql/data
      - edp-pgbackrest:/var/lib/pgbackrest
      - edp-pgbackrest-spool:/var/spool/pgbackrest
      - ./postgres/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - ./postgres/docker/init:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_command=pgbackrest --stanza=edp archive-push %p
      - -c
      - archive_timeout=60s
      - -c
      - max_wal_senders=3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  pgbouncer:
    image: ${PGBOUNCER_IMAGE:-edoburu/pgbouncer:v1.24.1-p0}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AIRFLOW_DATABASE_USER: ${AIRFLOW_DATABASE_USER:-airflow}
      AIRFLOW_DATABASE_PASSWORD: ${AIRFLOW_DATABASE_PASSWORD:-airflow}
      SUPERSET_DATABASE_USER: ${SUPERSET_DATABASE_USER:-superset}
      SUPERSET_DATABASE_PASSWORD: ${SUPERSET_DATABASE_PASSWORD:-superset}
      OPENMETADATA_DATABASE_USER: ${OPENMETADATA_DATABASE_USER:-openmetadata}
      OPENMETADATA_DATABASE_PASSWORD: ${OPENMETADATA_DATABASE_PASSWORD:-openmetadata}
      OPENMETADATA_AIRFLOW_DATABASE_USER: ${OPENMETADATA_AIRFLOW_DATABASE_USER:-openmetadata_airflow}
      OPENMETADATA_AIRFLOW_DATABASE_PASSWORD: ${OPENMETADATA_AIRFLOW_DATABASE_PASSWORD:-openmetadata_airflow}
      CKAN_DATABASE_USER: ${CKAN_DATABASE_USER:-ckan}
      CKAN_DATABASE_PASSWORD: ${CKAN_DATABASE_PASSWORD:-ckan}
      CKAN_DATASTORE_READONLY_USER: ${CKAN_DATASTORE_READONLY_USER:-ckan_datastore_readonly}
      CKAN_DATASTORE_READONLY_PASSWORD: ${CKAN_DATASTORE_READONLY_PASSWORD:-ckan_datastore_readonly}
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/docker/entrypoint.sh:/etc/pgbouncer/entrypoint.sh:ro
    command: ["/bin/sh", "/etc/pgbouncer/entrypoint.sh"]
    restart: unless-stopped

  pgbouncer-public:
    image: ${PGBOUNCER_IMAGE:-edoburu/pgbouncer:v1.24.1-p0}
    profiles:
      - db-port
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AIRFLOW_DATABASE_USER: ${AIRFLOW_DATABASE_USER:-airflow}
      AIRFLOW_DATABASE_PASSWORD: ${AIRFLOW_DATABASE_PASSWORD:-airflow}
      SUPERSET_DATABASE_USER: ${SUPERSET_DATABASE_USER:-superset}
      SUPERSET_DATABASE_PASSWORD: ${SUPERSET_DATABASE_PASSWORD:-superset}
      OPENMETADATA_DATABASE_USER: ${OPENMETADATA_DATABASE_USER:-openmetadata}
      OPENMETADATA_DATABASE_PASSWORD: ${OPENMETADATA_DATABASE_PASSWORD:-openmetadata}
      OPENMETADATA_AIRFLOW_DATABASE_USER: ${OPENMETADATA_AIRFLOW_DATABASE_USER:-openmetadata_airflow}
      OPENMETADATA_AIRFLOW_DATABASE_PASSWORD: ${OPENMETADATA_AIRFLOW_DATABASE_PASSWORD:-openmetadata_airflow}
      CKAN_DATABASE_USER: ${CKAN_DATABASE_USER:-ckan}
      CKAN_DATABASE_PASSWORD: ${CKAN_DATABASE_PASSWORD:-ckan}
      CKAN_DATASTORE_READONLY_USER: ${CKAN_DATASTORE_READONLY_USER:-ckan_datastore_readonly}
      CKAN_DATASTORE_READONLY_PASSWORD: ${CKAN_DATASTORE_READONLY_PASSWORD:-ckan_datastore_readonly}
    ports:
      - "6432:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/docker/entrypoint.sh:/etc/pgbouncer/entrypoint.sh:ro
    command: ["/bin/sh", "/etc/pgbouncer/entrypoint.sh"]
    restart: unless-stopped

  pgadmin:
    image: ${PGADMIN_IMAGE:-dpage/pgadmin4:9.15}
    depends_on:
      pgbouncer:
        condition: service_started
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_SERVER_JSON_FILE: /tmp/pgadmin-servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGPASS_FILE: /tmp/pgpass
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AIRFLOW_DATABASE_USER: ${AIRFLOW_DATABASE_USER:-airflow}
      AIRFLOW_DATABASE_PASSWORD: ${AIRFLOW_DATABASE_PASSWORD:-airflow}
      SUPERSET_DATABASE_USER: ${SUPERSET_DATABASE_USER:-superset}
      SUPERSET_DATABASE_PASSWORD: ${SUPERSET_DATABASE_PASSWORD:-superset}
      OPENMETADATA_DATABASE_USER: ${OPENMETADATA_DATABASE_USER:-openmetadata}
      OPENMETADATA_DATABASE_PASSWORD: ${OPENMETADATA_DATABASE_PASSWORD:-openmetadata}
      OPENMETADATA_AIRFLOW_DATABASE_USER: ${OPENMETADATA_AIRFLOW_DATABASE_USER:-openmetadata_airflow}
      OPENMETADATA_AIRFLOW_DATABASE_PASSWORD: ${OPENMETADATA_AIRFLOW_DATABASE_PASSWORD:-openmetadata_airflow}
      CKAN_DATABASE_USER: ${CKAN_DATABASE_USER:-ckan}
      CKAN_DATABASE_PASSWORD: ${CKAN_DATABASE_PASSWORD:-ckan}
      CKAN_DATASTORE_READONLY_USER: ${CKAN_DATASTORE_READONLY_USER:-ckan_datastore_readonly}
      CKAN_DATASTORE_READONLY_PASSWORD: ${CKAN_DATASTORE_READONLY_PASSWORD:-ckan_datastore_readonly}
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - ./pgadmin/docker/entrypoint.sh:/pgadmin4/entrypoint.sh:ro
      - edp-pgadmin:/var/lib/pgadmin
    command: ["/bin/sh", "/pgadmin4/entrypoint.sh"]
    restart: unless-stopped

  db-tools:
    build:
      context: .
      dockerfile: postgres/Dockerfile
    depends_on:
      pgbouncer:
        condition: service_started
    environment:
      EDP_RAW_DATABASE_URL: ${EDP_RAW_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_raw}
      EDP_ODS_DATABASE_URL: ${EDP_ODS_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_ods}
      EDP_VAULT_DATABASE_URL: ${EDP_VAULT_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_vault}
      EDP_MART_DATABASE_URL: ${EDP_MART_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_mart}
      EDP_APP_DATABASE_URL: ${EDP_APP_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_app}
    volumes:
      - .:/workspace
    working_dir: /workspace
    profiles:
      - tools

  dbt:
    build:
      context: .
      dockerfile: dbt/Dockerfile
    depends_on:
      pgbouncer:
        condition: service_started
    environment:
      DBT_PROFILES_DIR: /workspace/dbt
      DBT_TARGET: ${DBT_TARGET:-mart}
      DBT_PG_HOST: ${DBT_PG_HOST:-pgbouncer}
      DBT_PG_PORT: ${DBT_PG_PORT:-6432}
      DBT_PG_USER: ${DBT_PG_USER:-postgres}
      DBT_PG_PASSWORD: ${DBT_PG_PASSWORD:-postgres}
      DBT_RAW_DB: ${DBT_RAW_DB:-edp_raw}
      DBT_ODS_DB: ${DBT_ODS_DB:-edp_ods}
      DBT_VAULT_DB: ${DBT_VAULT_DB:-edp_vault}
      DBT_MART_DB: ${DBT_MART_DB:-edp_mart}
      DBT_THREADS: ${DBT_THREADS:-4}
    volumes:
      - .:/workspace
    working_dir: /workspace/dbt
    profiles:
      - tools

  gx:
    build:
      context: .
      dockerfile: gx/Dockerfile
    depends_on:
      pgbouncer:
        condition: service_started
    environment:
      GX_HOME: /workspace/gx
      GX_TARGET: ${GX_TARGET:-mart}
      GX_RAW_DATABASE_URL: ${GX_RAW_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_raw}
      GX_ODS_DATABASE_URL: ${GX_ODS_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_ods}
      GX_VAULT_DATABASE_URL: ${GX_VAULT_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_vault}
      GX_MART_DATABASE_URL: ${GX_MART_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_mart}
    volumes:
      - .:/workspace
    working_dir: /workspace/gx
    profiles:
      - tools

  opa:
    image: ${OPA_IMAGE:-openpolicyagent/opa:1.8.0}
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=${OPA_LOG_LEVEL:-info}
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./opa/policies:/policies:ro
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8181/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  opa-tools:
    image: ${OPA_IMAGE:-openpolicyagent/opa:1.8.0}
    volumes:
      - ./opa:/workspace/opa:ro
    working_dir: /workspace/opa
    profiles:
      - tools

  openbao:
    image: ${OPENBAO_IMAGE:-openbao/openbao:2.5.4}
    environment:
      BAO_ADDR: http://127.0.0.1:8200
      BAO_DEV_ROOT_TOKEN_ID: ${OPENBAO_DEV_ROOT_TOKEN_ID:-edp-local-root-token}
    command:
      - server
      - -dev
      - -dev-listen-address=0.0.0.0:8200
      - -dev-root-token-id=${OPENBAO_DEV_ROOT_TOKEN_ID:-edp-local-root-token}
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  openbao-tools:
    image: ${OPENBAO_IMAGE:-openbao/openbao:2.5.4}
    depends_on:
      openbao:
        condition: service_started
    environment:
      BAO_ADDR: ${OPENBAO_ADDR:-http://openbao:8200}
      BAO_TOKEN: ${OPENBAO_DEV_ROOT_TOKEN_ID:-edp-local-root-token}
    volumes:
      - ./openbao:/workspace/openbao:ro
    working_dir: /workspace/openbao
    entrypoint: ["bao"]
    profiles:
      - tools

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - edp-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  minio-init:
    image: ${MINIO_CLIENT_IMAGE:-quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1}
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-edp-raw}
      MINIO_BUCKET_ARCHIVE: ${MINIO_BUCKET_ARCHIVE:-edp-archive}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-edp-exports}
      MINIO_BUCKET_CKAN: ${MINIO_BUCKET_CKAN:-edp-ckan}
      MINIO_BUCKET_BACKUPS: ${MINIO_BUCKET_BACKUPS:-edp-backups}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$MINIO_BUCKET_RAW"
        mc mb --ignore-existing "local/$$MINIO_BUCKET_ARCHIVE"
        mc mb --ignore-existing "local/$$MINIO_BUCKET_EXPORTS"
        mc mb --ignore-existing "local/$$MINIO_BUCKET_CKAN"
        mc mb --ignore-existing "local/$$MINIO_BUCKET_BACKUPS"
    restart: "no"

  minio-client:
    image: ${MINIO_CLIENT_IMAGE:-quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1}
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: ["/bin/sh", "-c"]
    command: ["mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD && mc ls local"]
    profiles:
      - tools

  pgbackrest-tools:
    build:
      context: .
      dockerfile: postgres/Dockerfile.postgres
      args:
        POSTGRES_BASE_IMAGE: ${POSTGRES_BASE_IMAGE:-postgres:16-bookworm}
    user: postgres
    volumes:
      - edp-postgres:/var/lib/postgresql/data
      - edp-pgbackrest:/var/lib/pgbackrest
      - edp-pgbackrest-spool:/var/spool/pgbackrest
      - ./postgres/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
    entrypoint: ["pgbackrest"]
    profiles:
      - tools

  superset-init:
    image: ${SUPERSET_IMAGE:-apache/superset:6.1.0}
    depends_on:
      pgbouncer:
        condition: service_started
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-for-local-only}
      SUPERSET_DATABSE_URI: ${SUPERSET_DATABSE_URI:-postgresql+psycopg2://superset:superset@pgbouncer:6432/superset}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
      EDP_RAW_DATABASE_URL: ${EDP_RAW_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_raw}
      EDP_ODS_DATABASE_URL: ${EDP_ODS_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_ods}
      EDP_VAULT_DATABASE_URL: ${EDP_VAULT_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_vault}
      EDP_MART_DATABASE_URL: ${EDP_MART_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_mart}
      EDP_APP_DATABASE_URL: ${EDP_APP_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_app}
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py:ro
      - ./superset/docker/bootstrap.sh:/app/bootstrap.sh:ro
      - ./superset/docker/provision_databases.py:/app/provision_databases.py:ro
      - edp-superset-home:/app/superset_home
    command: ["/bin/bash", "/app/bootstrap.sh"]
    restart: "no"

  superset:
    image: ${SUPERSET_IMAGE:-apache/superset:6.1.0}
    depends_on:
      pgbouncer:
        condition: service_started
      superset-init:
        condition: service_completed_successfully
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-for-local-only}
      SUPERSET_DATABSE_URI: ${SUPERSET_DATABSE_URI:-postgresql+psycopg2://superset:superset@pgbouncer:6432/superset}
      EDP_RAW_DATABASE_URL: ${EDP_RAW_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_raw}
      EDP_ODS_DATABASE_URL: ${EDP_ODS_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_ods}
      EDP_VAULT_DATABASE_URL: ${EDP_VAULT_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_vault}
      EDP_MART_DATABASE_URL: ${EDP_MART_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_mart}
      EDP_APP_DATABASE_URL: ${EDP_APP_DATABASE_URL:-postgresql+psycopg://postgres:postgres@pgbouncer:6432/edp_app}
    ports:
      - "8088:8088"
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py:ro
      - edp-superset-home:/app/superset_home
    command: ["superset", "run", "-h", "0.0.0.0", "-p", "8088", "--with-threads"]

  airflow-init:
    image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.2.1}
    depends_on:
      pgbouncer:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_URL:-postgresql+psycopg2://airflow:airflow@pgbouncer:6432/airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY:-change-me-for-local-only}
      AIRFLOW__API_AUTH__JWT_ISSUER: airflow
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
    user: "0:0"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
    command: ["airflow", "version"]
    restart: "no"

  airflow-apiserver:
    image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.2.1}
    depends_on:
      pgbouncer:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_URL:-postgresql+psycopg2://airflow:airflow@pgbouncer:6432/airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY:-change-me-for-local-only}
      AIRFLOW__API_AUTH__JWT_ISSUER: airflow
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
    command: ["api-server"]
    restart: unless-stopped

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.2.1}
    depends_on:
      pgbouncer:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_URL:-postgresql+psycopg2://airflow:airflow@pgbouncer:6432/airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY:-change-me-for-local-only}
      AIRFLOW__API_AUTH__JWT_ISSUER: airflow
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
    command: ["scheduler"]
    restart: unless-stopped

  airflow-dag-processor:
    image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.2.1}
    depends_on:
      pgbouncer:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_URL:-postgresql+psycopg2://airflow:airflow@pgbouncer:6432/airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY:-change-me-for-local-only}
      AIRFLOW__API_AUTH__JWT_ISSUER: airflow
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
    command: ["dag-processor"]
    restart: unless-stopped

  openmetadata-elasticsearch:
    image: ${OPENMETADATA_ELASTICSEARCH_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:9.3.0}
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: ${OPENMETADATA_ELASTICSEARCH_JAVA_OPTS:--Xms1024m -Xmx1024m}
      xpack.security.enabled: "false"
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    volumes:
      - edp-openmetadata-elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health?pretty | grep status | grep -qE 'green|yellow' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  openmetadata-migrate:
    image: ${OPENMETADATA_IMAGE:-docker.getcollate.io/openmetadata/server:1.12.6}
    depends_on:
      pgbouncer:
        condition: service_started
      openmetadata-elasticsearch:
        condition: service_healthy
    environment:
      <<: *openmetadata-server-env
    command: ["./bootstrap/openmetadata-ops.sh", "migrate"]
    restart: "no"

  openmetadata-server:
    image: ${OPENMETADATA_IMAGE:-docker.getcollate.io/openmetadata/server:1.12.6}
    depends_on:
      pgbouncer:
        condition: service_started
      openmetadata-elasticsearch:
        condition: service_healthy
      openmetadata-migrate:
        condition: service_completed_successfully
    environment:
      <<: *openmetadata-server-env
    ports:
      - "8585:8585"
      - "8586:8586"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8586/healthcheck"]
    restart: unless-stopped

  openmetadata-ingestion:
    image: ${OPENMETADATA_INGESTION_IMAGE:-docker.getcollate.io/openmetadata/ingestion:1.12.6}
    depends_on:
      pgbouncer:
        condition: service_started
      openmetadata-elasticsearch:
        condition: service_started
      openmetadata-server:
        condition: service_started
    environment:
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__OPENMETADATA_AIRFLOW_APIS__DAG_GENERATED_CONFIGS: /opt/airflow/dag_generated_configs
      DB_HOST: ${OPENMETADATA_AIRFLOW_DB_HOST:-pgbouncer}
      DB_PORT: ${OPENMETADATA_AIRFLOW_DB_PORT:-6432}
      AIRFLOW_DB: ${OPENMETADATA_AIRFLOW_DATABASE:-openmetadata_airflow}
      DB_USER: ${OPENMETADATA_AIRFLOW_DATABASE_USER:-openmetadata_airflow}
      DB_SCHEME: ${OPENMETADATA_AIRFLOW_DB_SCHEME:-postgresql+psycopg2}
      DB_PASSWORD: ${OPENMETADATA_AIRFLOW_DATABASE_PASSWORD:-openmetadata_airflow}
      DB_PROPERTIES: ${OPENMETADATA_AIRFLOW_DB_PROPERTIES:-}
    ports:
      - "8081:8080"
    volumes:
      - edp-openmetadata-ingestion-dag-airflow:/opt/airflow/dag_generated_configs
      - edp-openmetadata-ingestion-dags:/opt/airflow/dags
      - edp-openmetadata-ingestion-tmp:/tmp
    entrypoint: /bin/bash
    command: ["/opt/airflow/ingestion_dependency.sh"]
    restart: unless-stopped

  ckan-solr:
    image: ${CKAN_SOLR_IMAGE:-ckan/ckan-solr:2.11-solr9}
    volumes:
      - edp-ckan-solr:/var/solr
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8983/solr/"]
      interval: 60s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  ckan-redis:
    image: ${CKAN_REDIS_IMAGE:-redis:7.2-alpine}
    healthcheck:
      test: ["CMD", "redis-cli", "-e", "QUIT"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ckan-datapusher:
    image: ${CKAN_DATAPUSHER_IMAGE:-ckan/ckan-base-datapusher:0.0.21}
    depends_on:
      pgbouncer:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8800"]
      interval: 60s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  ckan-init:
    image: ${CKAN_IMAGE:-ckan/ckan-base:2.11}
    depends_on:
      pgbouncer:
        condition: service_started
      ckan-solr:
        condition: service_healthy
      ckan-redis:
        condition: service_healthy
    environment:
      <<: *ckan-env
    volumes:
      - edp-ckan-storage:/var/lib/ckan
    command:
      - /bin/sh
      - -c
      - |
        set -e
        ckan -c /srv/app/ckan.ini db init
        ckan -c /srv/app/ckan.ini datastore set-permissions | psql "$$CKAN_DATASTORE_WRITE_URL"
        ckan -c /srv/app/ckan.ini sysadmin add "$$CKAN_SYSADMIN_NAME" email="$$CKAN_SYSADMIN_EMAIL" password="$$CKAN_SYSADMIN_PASSWORD" || true
    restart: "no"

  ckan:
    image: ${CKAN_IMAGE:-ckan/ckan-base:2.11}
    depends_on:
      pgbouncer:
        condition: service_started
      ckan-solr:
        condition: service_healthy
      ckan-redis:
        condition: service_healthy
      ckan-init:
        condition: service_completed_successfully
      ckan-datapusher:
        condition: service_started
    environment:
      <<: *ckan-env
    ports:
      - "5000:5000"
    volumes:
      - edp-ckan-storage:/var/lib/ckan
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:5000/api/action/status_show"]
      interval: 60s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  edp-postgres:
    name: edp-postgres
  edp-superset-home:
    name: edp-superset-home
  edp-pgadmin:
    name: edp-pgadmin
  edp-pgbackrest:
    name: edp-pgbackrest
  edp-pgbackrest-spool:
    name: edp-pgbackrest-spool
  edp-openmetadata-elasticsearch:
    name: edp-openmetadata-elasticsearch
  edp-openmetadata-ingestion-dag-airflow:
    name: edp-openmetadata-ingestion-dag-airflow
  edp-openmetadata-ingestion-dags:
    name: edp-openmetadata-ingestion-dags
  edp-openmetadata-ingestion-tmp:
    name: edp-openmetadata-ingestion-tmp
  edp-ckan-storage:
    name: edp-ckan-storage
  edp-ckan-solr:
    name: edp-ckan-solr
  edp-minio:
    name: edp-minio
